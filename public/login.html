<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Đăng nhập — APERO Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body class="grid place-items-center p-4">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-6">
      <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-500 grid place-items-center font-bold text-white text-2xl mb-3">A</div>
      <h1 class="text-2xl font-bold text-slate-900">APERO Onboarding</h1>
      <p class="text-sm text-slate-500 mt-1">Đăng nhập để tiếp tục</p>
    </div>

    <div id="errorBox" class="hidden mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm"></div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Mật khẩu</label>
        <div class="relative">
          <input
            type="password"
            id="password"
            required
            autofocus
            class="w-full px-4 py-3 pr-12 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            placeholder="Nhập mật khẩu"
          />
          <button
            type="button"
            id="togglePwd"
            tabindex="-1"
            aria-label="Hiện/ẩn mật khẩu"
            class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-slate-700 rounded transition"
          >
            <svg id="eyeOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeClosed" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button
        type="submit"
        id="submitBtn"
        class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-lg hover:from-indigo-700 hover:to-purple-700 transition disabled:opacity-50"
      >
        Đăng nhập
      </button>
    </form>

    <div id="configMissing" class="hidden mt-6 p-4 rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm">
      <div class="font-semibold mb-1">⚠️ Chưa cấu hình password</div>
      <div>Cần set env var <code class="bg-amber-100 px-1 rounded">SITE_PASSWORD</code> trên Vercel để bật chế độ login.</div>
    </div>
  </div>

  <script>
    const errBox = document.getElementById('errorBox');
    const showError = msg => { errBox.textContent = msg; errBox.classList.remove('hidden'); };

    async function init() {
      try {
        const cfg = await fetch('/api/auth/config').then(r => r.json());
        if (!cfg.enabled) {
          document.getElementById('configMissing').classList.remove('hidden');
          document.getElementById('loginForm').classList.add('hidden');
        }
      } catch {}
    }
    init();

    // Toggle show/hide password
    document.getElementById('togglePwd').addEventListener('click', () => {
      const input = document.getElementById('password');
      const open = document.getElementById('eyeOpen');
      const closed = document.getElementById('eyeClosed');
      if (input.type === 'password') {
        input.type = 'text';
        open.classList.add('hidden');
        closed.classList.remove('hidden');
      } else {
        input.type = 'password';
        open.classList.remove('hidden');
        closed.classList.add('hidden');
      }
      input.focus();
    });

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      errBox.classList.add('hidden');
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Đang xác thực...';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          const redirect = new URLSearchParams(location.search).get('redirect') || '/';
          location.href = redirect;
        } else {
          showError(data.error || 'Đăng nhập thất bại');
          btn.disabled = false; btn.textContent = 'Đăng nhập';
        }
      } catch (err) {
        showError('Lỗi mạng: ' + err.message);
        btn.disabled = false; btn.textContent = 'Đăng nhập';
      }
    });
  </script>
</body>
</html>
