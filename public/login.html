<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Đăng nhập — APERO Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
      min-height: 100vh;
    }
  </style>
</head>
<body class="grid place-items-center p-4">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-6">
      <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-500 grid place-items-center font-bold text-white text-2xl mb-3">A</div>
      <h1 class="text-2xl font-bold text-slate-900">APERO Onboarding</h1>
      <p class="text-sm text-slate-500 mt-1">Đăng nhập để tiếp tục</p>
    </div>

    <div id="errorBox" class="hidden mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm"></div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Mật khẩu</label>
        <input
          type="password"
          id="password"
          required
          autofocus
          class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          placeholder="Nhập mật khẩu"
        />
      </div>
      <button
        type="submit"
        id="submitBtn"
        class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-lg hover:from-indigo-700 hover:to-purple-700 transition disabled:opacity-50"
      >
        Đăng nhập
      </button>
    </form>

    <div id="configMissing" class="hidden mt-6 p-4 rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm">
      <div class="font-semibold mb-1">⚠️ Chưa cấu hình password</div>
      <div>Cần set env var <code class="bg-amber-100 px-1 rounded">SITE_PASSWORD</code> trên Vercel để bật chế độ login.</div>
    </div>
  </div>

  <script>
    const errBox = document.getElementById('errorBox');
    const showError = msg => { errBox.textContent = msg; errBox.classList.remove('hidden'); };

    async function init() {
      try {
        const cfg = await fetch('/api/auth/config').then(r => r.json());
        if (!cfg.enabled) {
          document.getElementById('configMissing').classList.remove('hidden');
          document.getElementById('loginForm').classList.add('hidden');
        }
      } catch {}
    }
    init();

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      errBox.classList.add('hidden');
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Đang xác thực...';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          const redirect = new URLSearchParams(location.search).get('redirect') || '/';
          location.href = redirect;
        } else {
          showError(data.error || 'Đăng nhập thất bại');
          btn.disabled = false; btn.textContent = 'Đăng nhập';
        }
      } catch (err) {
        showError('Lỗi mạng: ' + err.message);
        btn.disabled = false; btn.textContent = 'Đăng nhập';
      }
    });
  </script>
</body>
</html>
