<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Đăng nhập — APERO Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
      min-height: 100vh;
    }
    .gsi-container > div { display: flex; justify-content: center; }
  </style>
</head>
<body class="grid place-items-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-500 grid place-items-center font-bold text-white text-2xl mb-3">A</div>
      <h1 class="text-2xl font-bold text-slate-900">APERO Onboarding</h1>
      <p class="text-sm text-slate-500 mt-1">Đăng nhập để tiếp tục</p>
    </div>

    <div id="errorBox" class="hidden mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm"></div>
    <div id="loadingBox" class="hidden mb-4 p-3 rounded-lg bg-blue-50 border border-blue-200 text-blue-700 text-sm text-center">Đang xác thực…</div>

    <div class="gsi-container" id="googleBtn"></div>

    <div id="configMissing" class="hidden mt-6 p-4 rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm">
      <div class="font-semibold mb-1">⚠️ Chưa cấu hình Google OAuth</div>
      <div>Cần set env vars <code class="bg-amber-100 px-1 rounded">GOOGLE_CLIENT_ID</code> + <code class="bg-amber-100 px-1 rounded">SESSION_SECRET</code> trên Vercel.</div>
    </div>

    <p class="text-xs text-slate-400 text-center mt-8">
      <span id="domainHint">Chỉ chấp nhận email <strong>@apero.vn</strong></span>
    </p>
  </div>

  <script>
    const errBox = document.getElementById('errorBox');
    const loadBox = document.getElementById('loadingBox');
    const showError = msg => { errBox.textContent = msg; errBox.classList.remove('hidden'); loadBox.classList.add('hidden'); };
    const showLoading = () => { errBox.classList.add('hidden'); loadBox.classList.remove('hidden'); };

    async function handleCredentialResponse(response) {
      showLoading();
      try {
        const r = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          // Login OK → về trang chủ
          const redirect = new URLSearchParams(location.search).get('redirect') || '/';
          location.href = redirect;
        } else {
          showError(data.error || 'Đăng nhập thất bại');
        }
      } catch (err) {
        showError('Lỗi mạng: ' + err.message);
      }
    }

    async function init() {
      // Lấy config từ server
      let cfg;
      try {
        cfg = await fetch('/api/auth/config').then(r => r.json());
      } catch (e) {
        showError('Không kết nối được server');
        return;
      }
      if (!cfg.enabled || !cfg.google_client_id) {
        document.getElementById('configMissing').classList.remove('hidden');
        return;
      }
      // Update domain hint
      const domains = cfg.allowed_domains || [];
      if (domains.length) {
        document.getElementById('domainHint').innerHTML = 'Chỉ chấp nhận email ' + domains.map(d => `<strong>@${d}</strong>`).join(' hoặc ');
      }
      // Wait GSI loaded
      const ready = () => typeof google !== 'undefined' && google.accounts;
      while (!ready()) await new Promise(r => setTimeout(r, 100));
      google.accounts.id.initialize({
        client_id: cfg.google_client_id,
        callback: handleCredentialResponse
      });
      google.accounts.id.renderButton(
        document.getElementById('googleBtn'),
        { theme: 'outline', size: 'large', text: 'continue_with', width: 320 }
      );
    }
    init();
  </script>
</body>
</html>
