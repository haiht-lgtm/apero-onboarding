<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>APERO Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css?v=4" />
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          brand: { 50:'#eef2ff', 100:'#e0e7ff', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' }
        }
      }}
    };
  </script>
</head>
<body class="bg-slate-100 text-slate-800">
  <div class="flex min-h-screen">
    <!-- SIDEBAR -->
    <aside class="w-60 bg-gradient-to-b from-slate-900 to-slate-800 text-slate-200 flex flex-col sticky top-0 h-screen">
      <div class="px-4 py-5 flex items-center gap-3 border-b border-slate-700">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 grid place-items-center font-bold text-white text-lg">A</div>
        <div>
          <div class="font-bold text-white">APERO</div>
          <div class="text-[10px] tracking-widest text-slate-400 uppercase">Onboarding</div>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1 overflow-y-auto" id="sidebarMenu">
        <a class="menu-item" data-route="dashboard"><span>📊</span><span>Dashboard</span></a>
        <a class="menu-item" data-route="candidates"><span>👥</span><span>Ứng Viên</span></a>
      </nav>
      <div id="userBox" class="hidden px-3 py-3 border-t border-slate-700 flex items-center gap-3">
        <img id="userAvatar" class="w-8 h-8 rounded-full bg-slate-600" alt="" />
        <div class="flex-1 min-w-0">
          <div id="userName" class="text-xs font-semibold text-white truncate"></div>
          <div id="userEmail" class="text-[10px] text-slate-400 truncate"></div>
        </div>
        <a href="/settings" class="text-slate-400 hover:text-indigo-400 transition" title="Cài đặt" data-route="settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
        <button id="logoutBtn" title="Đăng xuất" class="text-slate-400 hover:text-red-400 transition">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
      <div class="px-4 py-3 border-t border-slate-700 text-xs text-slate-500">
        v2.0 · Today <span id="todayLabel"></span>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 min-w-0 flex flex-col">
      <header class="sticky top-0 z-10 bg-white border-b border-slate-200 px-7 py-4 flex justify-between items-center">
        <h1 id="pageTitle" class="text-xl font-bold text-slate-900">Dashboard</h1>
        <div id="topActions" class="flex gap-2"></div>
      </header>
      <section class="p-7 flex-1 overflow-x-auto" id="content">Loading…</section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

  <script src="/app.js?v=4"></script>
</body>
</html>
